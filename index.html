<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>os-anime | Character Constellation</title>
  <meta name="description" content="3D anime character similarity graph — AI-discovered connections across 20+ series" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #050508; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }
    #graph { width: 100vw; height: 100vh; }

    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; gap: 16px; padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(5,5,8,0.97) 0%, transparent 100%);
      pointer-events: none;
    }
    #top-bar > * { pointer-events: all; }
    #logo { font-size: 17px; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0; }
    #stat { font-size: 11px; color: #444; margin-left: auto; flex-shrink: 0; }

    #search-wrap { position: relative; flex: 1; max-width: 440px; }
    #search-wrap input {
      width: 100%; padding: 9px 36px 9px 38px; border-radius: 24px;
      border: 1px solid #1a1a2e; background: rgba(255,255,255,0.06);
      color: #fff; font-size: 13px; outline: none; font-family: inherit;
      transition: border-color .2s;
    }
    #search-wrap input:focus { border-color: #2a2a3e; background: rgba(255,255,255,0.09); }
    #search-wrap input::placeholder { color: #383848; }
    #search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }
    #search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #555; font-size: 12px; cursor: pointer; display: none; }
    #suggestions {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: rgba(8,8,14,0.98); border: 1px solid #1a1a2e; border-radius: 12px;
      list-style: none; overflow: hidden; z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: none;
    }
    #suggestions li { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; transition: background .12s; }
    #suggestions li:hover { background: rgba(255,255,255,0.05); }
    #suggestions li img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
    #suggestions li .sug-name { font-size: 13px; font-weight: 500; }
    #suggestions li .sug-group { margin-left: auto; color: #444; font-size: 11px; }

    #filter-bar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      max-width: 90vw; padding: 0 16px;
    }
    .pill {
      padding: 5px 13px; border-radius: 20px; border: 1px solid #1e1e2e;
      background: rgba(255,255,255,0.03); color: #666; font-size: 11px;
      cursor: pointer; transition: all .2s; white-space: nowrap; font-family: inherit;
    }
    .pill:hover { border-color: #444; color: #ccc; }
    .pill.active {
      background: rgba(255,255,255,0.1); color: #fff;
      border-color: var(--c, #fff);
      box-shadow: 0 0 10px var(--c, rgba(255,255,255,.2));
    }

    #sidebar {
      position: fixed; top: 0; right: 0; bottom: 0; width: 300px; z-index: 20;
      background: rgba(5,5,8,0.95); backdrop-filter: blur(20px);
      border-left: 1px solid #0f0f1a; padding: 20px 18px;
      overflow-y: auto; display: none; flex-direction: column; gap: 12px;
      animation: slideIn .22s ease;
    }
    #sidebar.open { display: flex; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    #sidebar-close { align-self: flex-end; background: none; border: none; color: #444; font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    #sidebar-close:hover { color: #fff; }
    #sidebar-img { width: 100%; border-radius: 8px; object-fit: cover; max-height: 180px; display: none; }
    #sidebar-name { font-size: 19px; font-weight: 700; line-height: 1.25; }
    #sidebar-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-series { color: #000; }
    .badge-role { background: #1a1a2e; color: #888; }
    #sidebar-fav { font-size: 12px; color: #666; }
    #sidebar-bio { font-size: 12.5px; line-height: 1.65; color: #bbb; }
    #related-title { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .08em; }
    .related-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #0f0f1a; }
    .related-item img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .ri-name { font-size: 12.5px; font-weight: 500; }
    .ri-group { color: #444; font-size: 11px; }
    .sim-wrap { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; min-width: 52px; }
    .sim-bar { height: 3px; border-radius: 2px; opacity: .75; }
    .sim-pct { font-size: 10px; color: #555; }

    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #050508;
      z-index: 100; gap: 16px; color: #555; font-size: 13px; letter-spacing: .05em;
    }
    .spinner {
      width: 36px; height: 36px; border: 2px solid #1a1a2e;
      border-top-color: rgba(255,255,255,.3); border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>Loading constellation...</span></div>

<div id="graph"></div>

<div id="top-bar">
  <div id="logo">&#127756; os-anime</div>
  <div id="search-wrap">
    <span id="search-icon">&#128269;</span>
    <input id="search-input" placeholder="Search a character, trait, or power..." autocomplete="off" />
    <button id="search-clear">&#x2715;</button>
    <ul id="suggestions"></ul>
  </div>
  <div id="stat"></div>
</div>

<div id="filter-bar"></div>

<div id="sidebar">
  <button id="sidebar-close">&#x2715;</button>
  <img id="sidebar-img" alt="" />
  <div id="sidebar-name"></div>
  <div id="sidebar-badges"></div>
  <div id="sidebar-fav"></div>
  <div id="sidebar-bio"></div>
  <div id="related-section" style="display:none">
    <div id="related-title">Most Similar Characters</div>
    <div id="related-list"></div>
  </div>
</div>

<script src="https://unpkg.com/3d-force-graph@1"></script>

<script>
(async () => {
  let data;
  try {
    const r = await fetch('graph.json');
    data = await r.json();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:#c0392b">Failed to load graph.json</p>';
    return;
  }

  const allNodes = data.nodes;
  const allLinks = data.links;

  document.getElementById('stat').textContent = `${allNodes.length} characters \u00b7 ${allLinks.length} connections`;

  let activeGroup = null;
  let highlightIds = new Set();

  const groups = [...new Set(allNodes.map(n => n.group))].sort();

  const filterBar = document.getElementById('filter-bar');
  const allPill = document.createElement('button');
  allPill.className = 'pill active'; allPill.textContent = 'All';
  allPill.onclick = () => setGroup(null);
  filterBar.appendChild(allPill);

  groups.forEach(g => {
    const color = allNodes.find(n => n.group === g)?.color || '#fff';
    const btn = document.createElement('button');
    btn.className = 'pill'; btn.textContent = g;
    btn.style.setProperty('--c', color);
    btn.dataset.group = g;
    btn.onclick = () => setGroup(g === activeGroup ? null : g);
    filterBar.appendChild(btn);
  });

  function setGroup(g) {
    activeGroup = g;
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', g === null ? p === allPill : p.dataset.group === g);
    });
    refreshGraph();
  }

  function getVisibleData() {
    if (!activeGroup) return { nodes: allNodes, links: allLinks };
    const ids = new Set(allNodes.filter(n => n.group === activeGroup).map(n => n.id));
    return {
      nodes: allNodes.filter(n => ids.has(n.id)),
      links: allLinks.filter(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return ids.has(s) && ids.has(t);
      })
    };
  }

  const Graph = ForceGraph3D()(document.getElementById('graph'))
    .backgroundColor('#050508')
    .nodeLabel(n => `${n.name} (${n.group})`)
    .nodeColor(n => highlightIds.size > 0 && !highlightIds.has(n.id) ? '#111' : (n.color || '#fff'))
    .nodeVal(n => {
      const base = n.role === 'Main' ? 5 : 3;
      return highlightIds.has(n.id) ? base * 2.5 : base;
    })
    .nodeOpacity(0.92)
    .linkColor(l => `rgba(255,255,255,${Math.min(0.35,(l.value||0.1)*0.8)})`)
    .linkWidth(l => (l.value||0.1) * 2.5)
    .linkDirectionalParticles(2)
    .linkDirectionalParticleSpeed(0.003)
    .linkDirectionalParticleWidth(1.2)
    .onNodeClick(node => openSidebar(node))
    .onEngineStop(() => Graph.zoomToFit(400, 80));

  function refreshGraph() {
    Graph.graphData(getVisibleData());
  }

  refreshGraph();
  document.getElementById('loading').style.display = 'none';

  function openSidebar(node) {
    const sb = document.getElementById('sidebar');
    sb.classList.add('open');

    const img = document.getElementById('sidebar-img');
    if (node.img) { img.src = node.img; img.style.display = 'block'; }
    else { img.style.display = 'none'; }

    document.getElementById('sidebar-name').textContent = node.name;
    document.getElementById('sidebar-name').style.color = node.color || '#fff';

    const badges = document.getElementById('sidebar-badges');
    badges.innerHTML = `<span class="badge badge-series" style="background:${node.color||'#555'}">${node.group}</span>`
      + (node.role ? `<span class="badge badge-role">${node.role}</span>` : '');

    document.getElementById('sidebar-fav').textContent =
      node.favorites > 0 ? `\u2764\ufe0f ${node.favorites.toLocaleString()} favorites on MAL` : '';
    document.getElementById('sidebar-bio').textContent = node.bio || '';

    const links = Graph.graphData().links;
    const edgeMap = {};
    links.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (s === node.id) edgeMap[t] = l.value;
      if (t === node.id) edgeMap[s] = l.value;
    });
    const related = allNodes
      .filter(n => edgeMap[n.id] !== undefined)
      .sort((a,b) => (edgeMap[b.id]||0) - (edgeMap[a.id]||0))
      .slice(0,6);

    const list = document.getElementById('related-list');
    list.innerHTML = '';
    if (related.length) {
      document.getElementById('related-section').style.display = 'block';
      related.forEach(r => {
        const pct = Math.round((edgeMap[r.id]||0)*100);
        const div = document.createElement('div');
        div.className = 'related-item';
        div.innerHTML = (r.img ? `<img src="${r.img}" alt="" />` : '')
          + `<div><div class="ri-name" style="color:${r.color||'#fff'}">${r.name}</div><div class="ri-group">${r.group}</div></div>`
          + `<div class="sim-wrap"><div class="sim-bar" style="width:${pct}%;max-width:52px;background:${r.color||'#fff'}"></div><div class="sim-pct">${pct}%</div></div>`;
        div.onclick = () => openSidebar(r);
        list.appendChild(div);
      });
    } else {
      document.getElementById('related-section').style.display = 'none';
    }

    Graph.cameraPosition(
      { x: node.x + 50, y: node.y + 30, z: node.z + 50 }, node, 1200
    );
  }

  document.getElementById('sidebar-close').onclick = () =>
    document.getElementById('sidebar').classList.remove('open');

  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');
  const sugList = document.getElementById('suggestions');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    searchClear.style.display = q ? 'block' : 'none';
    if (!q) { highlightIds = new Set(); sugList.style.display = 'none'; refreshGraph(); return; }
    const matches = allNodes.filter(n =>
      n.name.toLowerCase().includes(q) || (n.bio||'').toLowerCase().includes(q)
    );
    highlightIds = new Set(matches.map(n => n.id));
    refreshGraph();
    sugList.innerHTML = '';
    matches.slice(0,6).forEach(n => {
      const li = document.createElement('li');
      li.innerHTML = (n.img ? `<img src="${n.img}" alt="" />` : '')
        + `<span class="sug-name" style="color:${n.color||'#fff'}">${n.name}</span>`
        + `<span class="sug-group">${n.group}</span>`;
      li.onmousedown = () => {
        searchInput.value = n.name;
        sugList.style.display = 'none';
        highlightIds = new Set([n.id]);
        refreshGraph();
        openSidebar(n);
      };
      sugList.appendChild(li);
    });
    sugList.style.display = matches.length ? 'block' : 'none';
  });

  searchInput.addEventListener('blur', () => setTimeout(() => sugList.style.display = 'none', 150));
  searchClear.onclick = () => {
    searchInput.value = ''; highlightIds = new Set();
    searchClear.style.display = 'none'; sugList.style.display = 'none';
    refreshGraph();
  };

})();
</script>
</body>
</html>
