name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No cache here intentionally — no package-lock.json in repo

      - name: Install dependencies
        working-directory: ./web
        run: npm install

      - name: Copy graph.json if missing
        run: |
          mkdir -p web/public
          if [ ! -f web/public/graph.json ]; then
            cp data/sample_graph.json web/public/graph.json
          fi

      - name: Build
        working-directory: ./web
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          force_orphan: true
